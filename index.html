<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(102, 126, 234, 0.25);
        }
        
        .dark .card-hover:hover {
            box-shadow: 0 25px 50px -12px rgba(102, 126, 234, 0.15);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
        }
        
        .category-btn {
            transition: all 0.3s ease;
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hero-gradient {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        
        .dark .hero-gradient {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
        }
        
        input:focus, button:focus {
            outline: none;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
    </style>
</head>

        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        function renderFeaturedTools() {
            const grid = document.getElementById('featured-grid');
            const featuredTools = tools.filter(t => t.featured).slice(0, 6);
            
            grid.innerHTML = featuredTools.map(tool => `
                <a href="${tool.url}" target="_blank" class="glass rounded-2xl p-6 card-hover block">

                        </div>
                        <div class="flex-1 min-w-0">

                            <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-2">${tool.description}</p>

                    </div>

        function renderCategoryButtons() {
            const container = document.getElementById('category-buttons');
            container.innerHTML = categories.map(cat => `

                    class="category-btn px-4 py-2.5 rounded-xl font-medium text-sm bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-300 shadow-sm hover:shadow-md ${currentCategory === cat.id ? 'active' : ''}"
                >
                    <span class="mr-2">${cat.icon}</span>${cat.name}
                </button>
            `).join('');

            container.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.category;
                    renderCategoryButtons();
                    renderTools();
                });
            });
        }

        function filterTools() {
            return tools.filter(tool => {
                const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
                const matchesSearch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });
        }

        function renderTools() {
            const grid = document.getElementById('tools-grid');
            const filteredTools = filterTools();
            
            if (filteredTools.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <div class="text-6xl mb-4">🔍</div>
                        <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">未找到相关工具</h3>
                        <p class="text-gray-600 dark:text-gray-400">试试其他关键词或分类</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredTools.map(tool => `
                <a href="${tool.url}" target="_blank" class="glass rounded-2xl p-5 card-hover block">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-12 h-12 rounded-xl gradient-bg flex items-center justify-center text-2xl">
                            ${tool.icon}
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 dark:text-white">${tool.name}</h3>
                            <div class="flex items-center gap-1">
                                <svg class="w-3 h-3 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                                </svg>
                                <span class="text-xs text-gray-600 dark:text-gray-400">${tool.rating}</span>
                            </div>
                        </div>
                    </div>
                    <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-2 mb-4">${tool.description}</p>
                    <div class="flex items-center justify-between">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300">
                            ${categories.find(c => c.id === tool.category)?.name || tool.category}
                        </span>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                    </div>
                </a>
            `).join('');
        }

        function renderHotTools() {
            const grid = document.getElementById('hot-grid');
            const hotTools = tools.filter(t => t.hot).sort((a, b) => a.hot - b.hot).slice(0, 10);
            
            grid.innerHTML = hotTools.map((tool, index) => `
                <a href="${tool.url}" target="_blank" class="glass rounded-2xl p-5 card-hover block flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg ${index < 3 ? 'gradient-bg text-white' : 'bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300'}">
                        ${index + 1}
                    </div>
                    <div class="w-12 h-12 rounded-xl gradient-bg flex items-center justify-center text-2xl flex-shrink-0">
                        ${tool.icon}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-gray-900 dark:text-white mb-1">${tool.name}</h3>
                        <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-1">${tool.description}</p>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0">
                        <svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                        </svg>
                        <span class="font-medium text-gray-700 dark:text-gray-300">${tool.rating}</span>
                    </div>
                </a>
            `).join('');
        }

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        function performSearch() {
            searchQuery = searchInput.value.trim();
            renderTools();
            document.getElementById('tools').scrollIntoView({ behavior: 'smooth' });
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value.trim();
            renderTools();
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderFeaturedTools();
            renderCategoryButtons();
            renderTools();
            renderHotTools();
        });
    </script>
    <script src="https://pl29507126.effectivecpmnetwork.com/c1/cd/c0/c1cdc0ebac5fd0baf16121e85b1c40eb.js"></script>
